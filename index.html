<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Информационный дэшборд</title>
  <script>
    (function(){
      try {
        const key = 'office-dashboard-theme';
        const saved = localStorage.getItem(key);
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('theme-dark');
        }
      } catch (e) {
        // ignore
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Офисный дэшборд</h1>
        <p class="subtitle">Погода, курс валют, новости и графики в реальном времени</p>
      </div>
      <div class="controls">
        <button id="themeToggle" class="btn btn--ghost" aria-label="Переключить тему">Тёмная тема</button>
        <button id="fullscreenToggle" class="btn btn--ghost" aria-label="Включить ТВ-режим">TV режим</button>
      </div>
    </header>

    <div class="tab-list" role="tablist" aria-label="Переключение виджетов">
      <button class="tab-btn active" data-target="weather" role="tab">Погода</button>
      <button class="tab-btn" data-target="currency" role="tab">Валюты</button>
      <button class="tab-btn" data-target="news" role="tab">Новости</button>
      <button class="tab-btn" data-target="chart" role="tab">График</button>
      <button class="tab-btn" data-target="clock" role="tab">Часы</button>
    </div>

    <main class="dashboard">
      <section id="clock" class="widget widget--small widget--tab" data-tab="clock">
        <div class="widget__header">
          <h2>Часы</h2>
          <span class="widget__status" id="clockStatus"></span>
        </div>
        <div class="clock" id="clockTime">--:--:--</div>
        <div class="clock__date" id="clockDate">Загрузка...</div>
      </section>

      <section id="weather" class="widget widget--medium widget--tab active" data-tab="weather">
        <div class="widget__header">
          <h2>Погода</h2>
          <span class="widget__status" id="weatherStatus"></span>
        </div>
        <div class="widget__content" id="weatherContent">
          <div class="widget__spinner" id="weatherSpinner"></div>
          <div class="weather-panel">
            <div class="weather-main-card">
              <div class="weather-top">
                <div class="weather-location" id="weatherLocation">Bishkek, KG</div>
                <div class="weather-icon" id="weatherIcon">☀️</div>
              </div>
              <div class="weather-temp-group">
                <div class="weather-temp" id="weatherTemp">--°C</div>
                <div class="weather-condition" id="weatherCondition">Загрузка...</div>
              </div>
              <div class="weather-meta-grid">
                <div class="weather-chip">Ощущается <span id="weatherFeels">--°</span></div>
                <div class="weather-chip">Влажность <span id="weatherHumidity">--%</span></div>
                <div class="weather-chip">Ветер <span id="weatherWind">-- км/ч</span></div>
              </div>
            </div>
            <div class="weather-forecast" id="weatherForecast"></div>
          </div>
        </div>
      </section>

      <section id="currency" class="widget widget--medium widget--tab" data-tab="currency">
        <div class="widget__header">
          <h2>Курс валют</h2>
          <span class="widget__status" id="currencyStatus"></span>
        </div>
        <div class="widget__content" id="currencyContent">
          <div class="widget__spinner" id="currencySpinner"></div>
          <ul class="rates" id="currencyRates"></ul>
        </div>
      </section>

      <section id="news" class="widget widget--large widget--tab" data-tab="news">
        <div class="widget__header">
          <h2>Последние новости</h2>
          <span class="widget__status" id="newsStatus"></span>
        </div>
        <div class="widget__content" id="newsContent">
          <div class="widget__spinner" id="newsSpinner"></div>
          <ul class="news-list" id="newsList"></ul>
        </div>
      </section>

      <section id="chart" class="widget widget--large widget--tab" data-tab="chart">
        <div class="widget__header">
          <h2>Прогноз температуры</h2>
          <span class="widget__status" id="chartStatus"></span>
        </div>
        <div class="widget__content chart-card">
          <canvas id="temperatureChart" aria-label="График температуры" role="img"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
